# Site configuration for the @drasi/lib (Node.js) documentation site.
#
# This mirrors the main drasi-project/docs Hugo + Docsy setup, scoped to the
# Node.js library. It is published to GitHub Pages by
# .github/workflows/website.yml.

baseURL = "https://drasi-project.github.io/drasi-nodejs/"
title = "@drasi/lib Docs"
theme = "docsy"

# Attribution
author = "Copyright © contributors to Drasi, established as Drasi a Series of LF Projects, LLC"
copyright = """Copyright&nbsp;©&nbsp;Drasi&nbsp;a&nbsp;Series&nbsp;of&nbsp;LF&nbsp;Projects,&nbsp;LLC. For&nbsp;website&nbsp;terms&nbsp;of&nbsp;use,&nbsp;trademark&nbsp;policy&nbsp;and&nbsp;other&nbsp;project&nbsp;policies&nbsp;please&nbsp;see&nbsp;<a href="https://lfprojects.org/policies/">lfprojects.org/policies/</a>."""

# Language configuration
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true

# Top navbar links
[[menu.main]]
    name = "npm"
    weight = 5
    url = "https://www.npmjs.com/package/@drasi/lib"
    pre = "<i class='fab fa-npm'></i>"
[[menu.main]]
    name = "GitHub"
    weight = 10
    url = "https://github.com/drasi-project/drasi-nodejs"
    pre = "<i class='fab fa-github'></i>"
[[menu.main]]
    name = "Drasi.io"
    weight = 20
    url = "https://drasi.io"
    pre = "<i class='fas fa-external-link-alt'></i>"
[[menu.main]]
    name = "Discord"
    weight = 30
    url = "https://aka.ms/drasidiscord"
    pre = "<i class='fab fa-discord'></i>"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.110.0"

# UI customization
[params]
  # Built-in (offline) lunr.js search — no external service required.
  offlineSearch = true
  offlineSearchMaxResults = 10

  # "Edit this page" links point back at this repository.
  github_repo = "https://github.com/drasi-project/drasi-nodejs"
  github_branch = "main"
  github_subdir = "website"

  # Version banner shown on every page.
  version = "pre-1.0"

[params.ui]
  sidebar_menu_compact = false
  sidebar_search_disable = false
  sidebar_menu_foldable = true
  sidebar_menu_truncate = 100
  ul_show = 1
  navbar_logo = true
  showLightDarkModeMenu = true
  [params.ui.readingtime]
    enable = true

# "Was this page helpful?" feedback widget
[params.ui.feedback]
  enable = true
  yes = 'Glad to hear it! Please <a href="https://github.com/drasi-project/drasi-nodejs/issues/new">tell us how we can improve</a>.'
  no = 'Sorry to hear that. Please <a href="https://github.com/drasi-project/drasi-nodejs/issues/new">tell us how we can improve</a>.'

# Links surfaced in the footer / about section.
[[params.links.user]]
  name = "npm"
  url = "https://www.npmjs.com/package/@drasi/lib"
  icon = "fab fa-npm"
  desc = "Install @drasi/lib from npm"
[[params.links.developer]]
  name = "GitHub"
  url = "https://github.com/drasi-project/drasi-nodejs"
  icon = "fab fa-github"
  desc = "Source, issues and contributions"
[[params.links.developer]]
  name = "Discord"
  url = "https://aka.ms/drasidiscord"
  icon = "fab fa-discord"
  desc = "Chat with the Drasi community"

# Use git commit dates for "last modified".
[frontmatter]
  lastmod = [":git", "lastmod", "date", "publishDate"]
