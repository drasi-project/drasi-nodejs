# Tag-triggered release pipeline for @drasi/lib.
#
# Builds the native addon for all five declared napi targets, then publishes the
# main package plus the per-platform optional-dependency packages
# (@drasi/lib-<platform>) to npm with build provenance.
#
# Trigger: pushing a `vX.Y.Z` tag runs the full build matrix and then publishes.
# `workflow_dispatch` runs the build matrix only (no publish) so maintainers can
# validate the cross-platform builds without cutting a release.
#
# Every target is built on a matching native runner (no cross-compilation). The
# dependency tree includes C/assembly crates (e.g. aws-lc-sys) whose cross builds
# are fragile, and the native build path is already exercised by ci.yml, so native
# runners are the most reliable choice. The Linux jobs are pinned to Ubuntu 22.04
# (glibc 2.35) to lower the glibc floor for the prebuilt binaries; see
# docs/releasing.md if an even lower floor is ever required.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-13
            target: x86_64-apple-darwin
          - host: macos-14
            target: aarch64-apple-darwin
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            target/
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-release-

      - name: Install dependencies
        run: npm install

      # Route through the npm script so build flags (e.g. --no-const-enum) stay
      # single-sourced in package.json and never drift from local/CI builds.
      - name: Build addon
        run: npm run build:release -- --target ${{ matrix.target }}
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: drasi.*.node
          if-no-files-found: error

      # The loader (index.js) and generated type declarations (index.d.ts) are
      # platform-independent, so publish them once from the linux-x64 build.
      - name: Upload loader + type declarations
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: bindings-metadata
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    # Only publish for real tag pushes; workflow_dispatch is build-only.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance / OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing (tokenless) needs npm >= 11.5.1; upgrading also
      # keeps provenance support current for the token path.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Create per-platform npm dirs
        run: npx napi create-npm-dirs

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Restore loader + type declarations
        run: cp artifacts/bindings-metadata/index.js artifacts/bindings-metadata/index.d.ts .

      - name: Move binaries into per-platform packages
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: List per-platform packages
        run: ls -R ./npm
        shell: bash

      - name: Publish to npm
        # prepublishOnly (napi prepublish -t npm) publishes the per-platform
        # optional-dependency packages and injects optionalDependencies into the
        # main package.json; the final `npm publish` ships the main package. Both
        # inherit provenance from the npm config set below.
        run: |
          npm config set provenance true
          if [ -n "$NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          else
            echo "NPM_TOKEN not set; relying on OIDC trusted publishing."
          fi
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
