# Tag-triggered release pipeline for @drasi/lib.
#
# Builds the native addon for all five declared napi targets, then publishes the
# main package plus the per-platform optional-dependency packages
# (@drasi/lib-<platform>) to npm with build provenance.
#
# Trigger: pushing a `vX.Y.Z` tag runs the full build matrix and then publishes
# to public npm. `workflow_dispatch` runs the build matrix only (no publish) so
# maintainers can validate the cross-platform builds without cutting a release.
#
# An OPTIONAL, opt-in `publish-internal` job can additionally publish the same
# build to an Azure Artifacts npm feed for Microsoft-internal consumption. It is
# OFF by default and never required for a public release; enable it per-run with
# the `publish_internal` dispatch input, or on tag pushes with the repo variable
# ENABLE_INTERNAL_PUBLISH=true. See docs/releasing.md for setup and secrets.
#
# Every target is built on a matching native runner (no cross-compilation). The
# dependency tree includes C/assembly crates (e.g. aws-lc-sys) whose cross builds
# are fragile, and the native build path is already exercised by ci.yml, so native
# runners are the most reliable choice. The Linux jobs are pinned to Ubuntu 22.04
# (glibc 2.35) to lower the glibc floor for the prebuilt binaries; see
# docs/releasing.md if an even lower floor is ever required.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_internal:
        description: >-
          Also publish this build to the internal Azure Artifacts feed
          (requires AZURE_ARTIFACTS_* secrets/vars — see docs/releasing.md).
          Leave false for a normal build-only dispatch.
        type: boolean
        default: false
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-14
            target: aarch64-apple-darwin
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # RocksDB (via librocksdb-sys) compiles bundled C++ and runs bindgen, which
      # needs libclang. macOS ships it with the CLT; Linux needs the dev package
      # and Windows needs LLVM on LIBCLANG_PATH.
      - name: Install libclang for rocksdb bindgen (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - name: Point bindgen at LLVM (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            target/
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-release-

      - name: Install dependencies
        run: npm install

      # Route through the npm script so build flags (e.g. --no-const-enum) stay
      # single-sourced in package.json and never drift from local/CI builds.
      - name: Build addon
        run: npm run build:release -- --target ${{ matrix.target }}
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: drasi.*.node
          if-no-files-found: error

      # The loader (index.js) and generated type declarations (index.d.ts) are
      # platform-independent, so publish them once from the linux-x64 build.
      - name: Upload loader + type declarations
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: bindings-metadata
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    # Only publish for real tag pushes; workflow_dispatch is build-only.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance / OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing (tokenless) needs npm >= 11.5.1; upgrading also
      # keeps provenance support current for the token path. Requires a recent
      # Node (npm >= 12 dropped Node 20), hence node-version 24 for this job.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Create per-platform npm dirs
        run: npx napi create-npm-dirs

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Restore loader + type declarations
        run: cp artifacts/bindings-metadata/index.js artifacts/bindings-metadata/index.d.ts .

      - name: Move binaries into per-platform packages
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: List per-platform packages
        run: ls -R ./npm
        shell: bash

      - name: Verify npm auth
        # Non-fatal: on the token path this prints the account; if it fails here
        # the token is missing/invalid (vs. a scope-permission error at publish).
        run: npm whoami || echo "npm whoami failed — no token (OIDC path) or invalid credentials"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        # prepublishOnly (napi prepublish -t npm) publishes the per-platform
        # optional-dependency packages and injects optionalDependencies into the
        # main package.json; the final `npm publish` ships the main package. Both
        # inherit provenance from the npm config set below.
        #
        # Auth flows through the .npmrc that actions/setup-node wrote, which reads
        # the token from NODE_AUTH_TOKEN (this is the file npm actually uses via
        # NPM_CONFIG_USERCONFIG — a manual `~/.npmrc` write would be ignored).
        # NODE_AUTH_TOKEN is empty when publishing via OIDC trusted publishing.
        run: |
          npm config set provenance true
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # OPTIONAL internal publish to an Azure Artifacts npm feed.
  #
  # This job is OFF by default and NEVER required for a public OSS release. The
  # public `publish` job above is unaffected by anything here. It runs only when
  # a maintainer explicitly opts in, in one of two ways:
  #   * manual: run the workflow via workflow_dispatch with publish_internal=true, or
  #   * on tag pushes: set the repo/environment variable ENABLE_INTERNAL_PUBLISH=true.
  #
  # To enable it, configure these repo (or environment) secrets/variables — no
  # secrets are committed to the repo:
  #   * secret  AZURE_ARTIFACTS_TOKEN        — PAT with publish rights to the feed
  #   * variable AZURE_ARTIFACTS_REGISTRY_URL — e.g.
  #       https://pkgs.dev.azure.com/ORG/PROJECT/_packaging/FEED/npm/registry/
  # See docs/releasing.md ("Internal Azure Artifacts Publish") for setup.
  publish-internal:
    name: Publish to Azure Artifacts (internal, optional)
    needs: build
if: >-
  startsWith(github.ref, 'refs/tags/v') &&
  (
    (github.event_name == 'workflow_dispatch' && inputs.publish_internal) ||
    (github.event_name == 'push' && vars.ENABLE_INTERNAL_PUBLISH == 'true')
  )
    runs-on: ubuntu-latest
    permissions:
      contents: read # no id-token: provenance is public-npm/OIDC only, not used here
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Create per-platform npm dirs
        run: npx napi create-npm-dirs

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Restore loader + type declarations
        run: cp artifacts/bindings-metadata/index.js artifacts/bindings-metadata/index.d.ts .

      - name: Move binaries into per-platform packages
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Validate internal feed configuration
        # Fail fast with a clear message if the opt-in ran without the config.
        run: |
          if [ -z "${AZURE_ARTIFACTS_REGISTRY_URL}" ]; then
            echo "::error::AZURE_ARTIFACTS_REGISTRY_URL is not set. Configure it as a repo/environment variable to enable internal publishing."
            exit 1
          fi
          if [ -z "${AZURE_ARTIFACTS_TOKEN}" ]; then
            echo "::error::AZURE_ARTIFACTS_TOKEN secret is not set. Configure it to enable internal publishing."
            exit 1
          fi
        env:
          AZURE_ARTIFACTS_REGISTRY_URL: ${{ vars.AZURE_ARTIFACTS_REGISTRY_URL }}
          AZURE_ARTIFACTS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}

      - name: Configure Azure Artifacts auth (.npmrc)
        # Write a project .npmrc pointing at the internal feed. The token is
        # referenced via ${AZURE_ARTIFACTS_TOKEN} so npm substitutes it from the
        # environment at publish time rather than writing it to disk in cleartext.
        # NOTE: some Azure Artifacts feeds expect the legacy base64 password form
        # (:username / :_password / :email) instead of :_authToken — adjust here
        # if your feed rejects bearer-token auth (see docs/releasing.md).
        run: |
          REG="${AZURE_ARTIFACTS_REGISTRY_URL%/}/"
          AUTHKEY="${REG#https:}"
          {
            echo "registry=${REG}"
            echo "always-auth=true"
            echo "${AUTHKEY}:_authToken=\${AZURE_ARTIFACTS_TOKEN}"
          } > .npmrc
        env:
          AZURE_ARTIFACTS_REGISTRY_URL: ${{ vars.AZURE_ARTIFACTS_REGISTRY_URL }}

      - name: Publish to Azure Artifacts
        # `publish:internal` sets npm_config_registry (so the per-platform
        # prepublish child publishes also target the feed) and disables
        # provenance. Auth comes from the .npmrc written above.
        run: npm run publish:internal
        env:
          AZURE_ARTIFACTS_REGISTRY_URL: ${{ vars.AZURE_ARTIFACTS_REGISTRY_URL }}
          AZURE_ARTIFACTS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
