# Build and test @drasi/lib.
#
# Rust dependencies (the Drasi engine + plugin host SDK) come from crates.io, so no
# sibling checkout is needed. The npm `pretest` step fetches the example plugin
# crates from crates.io and builds them so the host and plugins share a matching
# plugin-SDK / FFI ABI.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout drasi-nodejs
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build addon
        run: npm run build

      - name: Type-check the generated .d.ts
        run: npm run test:types

      - name: Rust unit tests
        # `test-dyn` forwards napi/dyn-symbols so napi-sys resolves Node-API
        # symbols at runtime (libloading), letting a standalone test harness link
        # on Linux (macOS already links; MSVC always uses runtime loading). The
        # shipped cdylib is built by `npm run build` above and never enables this.
        run: cargo test --features test-dyn

      - name: Test (pretest builds + stages example plugins)
        run: npm test

  # Cross-platform prebuilt binaries and npm publishing live in `release.yml`,
  # which builds the `napi.targets` on tag pushes (`v*`) and publishes the main
  # package plus the per-platform optional-dependency packages with provenance.
  # This workflow stays focused on fast per-PR validation.

  # Meaningful coverage for a native addon lives in Rust: the JS surface is just
  # the napi-generated loader, so we gate line coverage of the pure, FFI-free
  # marshalling/validation logic (conversions.rs + error.rs) with cargo-llvm-cov.
  # Pure logic is platform-independent, so a single-OS gate is sufficient; the
  # cross-platform behavioral guarantee stays with `npm test` on all three OSes.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout drasi-nodejs
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust coverage gate (pure logic)
        run: |
          cargo llvm-cov --features test-dyn --lib \
            --ignore-filename-regex '(drasi|components|secrets|lib|types)\.rs$' \
            --fail-under-lines 90 \
            --summary-only
