# Build and test @drasi/lib.
#
# Rust dependencies (the Drasi engine + plugin host SDK) come from crates.io, so no
# sibling checkout is needed. The npm `pretest` step fetches the example plugin
# crates from crates.io and builds them so the host and plugins share a matching
# plugin-SDK / FFI ABI.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout drasi-nodejs
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build addon
        run: npm run build

      - name: Test (pretest builds + stages example plugins)
        run: npm test

  # Cross-platform prebuilt binaries for npm publishing are a roadmap item.
  # `@napi-rs/cli` supports a build matrix + per-platform optional-dependency
  # packages; wire it up here as a follow-up.
