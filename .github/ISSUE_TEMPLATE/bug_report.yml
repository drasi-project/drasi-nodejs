name: Bug report
description: Report a problem with @drasi/lib (the Node.js bindings)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please do **not** report security
        vulnerabilities here — see [SECURITY.md](https://github.com/drasi-project/drasi-nodejs/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or steps that reproduce the issue.
      render: javascript
    validations:
      required: true
  - type: input
    id: lib-version
    attributes:
      label: "@drasi/lib version"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.11.0 (output of `node -v`)"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x64
        - Linux arm64
        - macOS arm64 (Apple silicon)
        - macOS x64 (Intel — built from source)
        - Windows x64
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output. Set `RUST_LOG=debug` for engine logs.
      render: shell
    validations:
      required: false
