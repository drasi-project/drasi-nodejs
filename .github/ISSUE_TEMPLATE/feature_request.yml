name: Feature request
description: Suggest an enhancement or new capability for @drasi/lib
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For larger changes, please align with the
        maintainers on the approach before writing code (see
        [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The API or behavior you'd like. Sketch method signatures if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
