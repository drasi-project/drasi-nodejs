appId: io.drasi.trading
productName: Drasi Trading Demo
directories:
  output: dist
files:
  - out/**
  - package.json
  - data/**
# The engine is a native N-API addon: it must be unpacked from the asar archive
# so the OS loader can dlopen the .node file at runtime.
asarUnpack:
  - "**/*.node"
  - "node_modules/@drasi/lib/**"
win:
  target: dir
mac:
  target: dir
linux:
  target: dir
